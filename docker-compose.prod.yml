# Production deploy: `docker compose -f docker-compose.prod.yml --env-file .env.production up -d --build`
#
# Only nginx publishes a port. Everything else — backend, postgres, redis — talks over
# the private `syncflow-internal` network and is unreachable from the host.
services:
  backend:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    restart: unless-stopped
    deploy:
      replicas: 2
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER:-syncflow}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/${POSTGRES_DB:-syncflow}
      REDIS_URL: redis://redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:?JWT_ACCESS_SECRET must be set}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET must be set}
      JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-15m}
      JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-7d}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:?COOKIE_DOMAIN must be set}
      CORS_ORIGIN: ${CORS_ORIGIN:?CORS_ORIGIN must be set}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - syncflow-internal

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-syncflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-syncflow}
    volumes:
      - syncflow_postgres_data_prod:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syncflow} -d ${POSTGRES_DB:-syncflow}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - syncflow-internal

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - syncflow_redis_data_prod:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - syncflow-internal

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Optional: drop a static export of apps/web here for the fully containerized
      # path. Empty by default — nginx just 404s on `/` and the frontend runs on
      # Vercel instead (see CLAUDE.md).
      - ./nginx/html:/usr/share/nginx/html:ro
    depends_on:
      - backend
    networks:
      - syncflow-internal

networks:
  syncflow-internal:
    driver: bridge

volumes:
  syncflow_postgres_data_prod:
    name: syncflow_postgres_data_prod
  syncflow_redis_data_prod:
    name: syncflow_redis_data_prod
