services:
  postgres:
    image: postgres:16-alpine
    container_name: syncflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-syncflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-syncflow_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-syncflow}
    ports:
      - "${POSTGRES_PORT:-5434}:5432"
    volumes:
      - syncflow_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-syncflow} -d ${POSTGRES_DB:-syncflow}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: syncflow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6380}:6379"
    volumes:
      - syncflow_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  syncflow_postgres_data:
    name: syncflow_postgres_data
  syncflow_redis_data:
    name: syncflow_redis_data
