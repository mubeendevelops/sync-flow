worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # Only upgrade the Connection header for actual WebSocket requests; plain HTTP
    # requests through the same upstream get a normal keep-alive connection.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # A bare hostname resolves, at nginx startup, to every A record Docker's embedded
    # DNS returns for the `backend` service — with `deploy.replicas: 2` that's one IP
    # per replica, so this single `server` line is enough for least_conn to balance
    # across both. Caveat: nginx (open-source) resolves once at startup, not
    # dynamically — `docker compose restart nginx` after rescaling the backend.
    upstream syncflow_backend {
        least_conn;
        server backend:4000;
    }

    server {
        listen 80;

        location /socket.io/ {
            proxy_pass http://syncflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            # Long-lived WS connections shouldn't be cut on nginx's default 60s.
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        location /api/ {
            proxy_pass http://syncflow_backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location = /health {
            proxy_pass http://syncflow_backend;
            proxy_set_header Host $host;
        }

        location = /ready {
            proxy_pass http://syncflow_backend;
            proxy_set_header Host $host;
        }

        # Optional: serve a pre-built apps/web static export if one has been placed
        # into ./nginx/html (bind-mounted below). Not required for a working deploy —
        # the frontend is served from Vercel in prod by default (see CLAUDE.md); this
        # just supports the fully self-contained/containerized path too.
        root /usr/share/nginx/html;
        location / {
            try_files $uri $uri.html $uri/index.html =404;
        }
    }
}
